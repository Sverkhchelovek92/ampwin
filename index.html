<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMPWIN Music Player</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="title-bar">
        <span class="title-text">AMPWIN</span>
        <button
          class="close-btn"
          title="Close"
          onclick="window.location.href = 'https://www.google.com'"
        >
          X
        </button>
      </div>

      <div class="info-block" id="infoBlock">
        <div class="left-section">
          <div class="display-block">
            <div class="time-display">
              <span id="playState">▶</span>
              <span id="currentTime">00:00</span>
            </div>

            <canvas id="visualizer"></canvas>
          </div>
        </div>
        <div class="right-section">
          <div class="track-name" id="trackName">
            <div class="marquee-wrapper" id="marqueeWrapper">
              <span class="marquee-item" id="marqueeItem"
                >No tracks selected</span
              >
            </div>
          </div>
          <div class="quality-display">
            <div class="quality-kbps" id="kbps">
              <div class="kbps-display" id="kbpsDisplay">--</div>
              kbps
            </div>
            <div class="quality-khz" id="khz">
              <div class="khz-display" id="khzDisplay">--</div>
              kHz
            </div>
          </div>
          <div class="volume-balance">
            <div class="volume-container">
              <label for="volume"></label>
              <input
                type="range"
                id="volume"
                min="0"
                max="1"
                step="0.01"
                value="1"
              />
            </div>
            <div class="balance-container">
              <input
                type="range"
                id="balance"
                min="-1"
                max="1"
                step="0.01"
                value="0"
              />
            </div>
          </div>
        </div>
      </div>
      <!-- <div class="track-info" id="trackInfo">No tracks selected</div> -->

      <div class="progress-container" id="progressContainer">
        <div class="progress-track">
          <div class="seek-knob" id="progress"></div>
        </div>
      </div>

      <div class="transport-section">
        <button class="transport-btn" id="prevBtn" disabled>⏮</button>
        <button class="transport-btn" id="playBtn" disabled>▶</button>
        <button class="transport-btn" id="pauseBtn" disabled>⏸</button>
        <button class="transport-btn" id="stopBtn" disabled>⏹</button>
        <button class="transport-btn" id="nextBtn" disabled>⏭</button>
        <button type="button" class="transport-btn open-btn">
          <label for="fileInput" class="file-label-inside">Open</label>
          <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        </button>
        <button class="transport-btn shuffle-btn" id="shuffleBtn">
          <div class="shuffle-indicator"></div>
          Shuffle
        </button>
        <button class="transport-btn loop-btn" id="loopBtn">
          <div class="loop-indicator"></div>
          ↺
        </button>
      </div>
      <div class="playlist-panel">
        <ul id="playlist" class="playlist-list"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
